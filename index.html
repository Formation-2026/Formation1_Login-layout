<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Login layout</title>
</head>
<body>
    
    <section>
        <img  class="img1" src="./Images/3d-hygge-young-woman-working-at-the-table-wearing-vr-glasses 1.svg" alt="Login layout">

        <div class="block1">
            <h2>Connexion a Blue Ocean</h2>
            <div class="block2">

                <form>
                    <label class="email">Email</label><br>
                    <div class="form1">
                        <img class="img2" src="./Images/Vector (2).svg" alt="">
                        <input class="input1" type="text" placeholder="abc@example.com">
                    </div>

                    <label class="mot_de_passe">Mot de passe</label><br>
                    <div class="form2">
                        <img class="img3" src="./Images/Vector (1).svg" alt="password">
                        <input class="input2" type="password" placeholder="* * * * * *">
                    </div>
                </form>

                <a  class="password" href="password">Mot de passe oublié? </a><br>
                <button  class="btn1" onclick="window.location='connexion.html'">connexion</button>
                <p>ou avec</p>
                <div class="block3">
                    <img class="img4" src="./Images/Ellipse 1.svg" alt="ellipse1">
                    <img class="img5" src="./Images/chercher 1.svg" alt="google">
                    <img class="img6" src="./Images/Ellipse 2.svg" alt="ellipse2">
                    <img class="img7" src="./Images/facebook 1.svg" alt="facebook">
                    <img class="img8" src="./Images/Ellipse 3.svg" alt="ellipse3">
                    <img class="img9" src="./Images/github (1) 1.svg" alt="github">
                </div>
        </div>
    </section>
</body>
</html>
